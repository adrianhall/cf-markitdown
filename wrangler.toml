name = "cf-markitdown"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# Workers AI is required for markdown conversion
[ai]
binding = "AI"
remote = true

# KV namespace for API keys
[[kv_namespaces]]
binding = "API_KEYS_KV"
id = "${KV_NAMESPACE_ID}"
preview_id = "${KV_PREVIEW_ID}"

# Secrets (set via wrangler secret put):
# JWT_SIGNING_KEY - for JWT authentication
# LOG_LEVEL - logging verbosity

# Enable Workers Logs
[observability]
enabled = true
head_sampling_rate = 1
